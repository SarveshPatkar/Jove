<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get In Touch | Jove HR Services</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
body{
    background: linear-gradient(135deg,#f5f7fa,#e9f1ff);
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
}

.contact-box{
    max-width:750px;
    margin:70px auto;
    background:#fff;
    padding:50px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.12);
}

.contact-box h2{
    color:#0d6efd;
    font-weight:700;
    margin-bottom:10px;
}

.contact-box p{
    color:#6c757d;
    margin-bottom:30px;
}

.form-label{
    font-weight:600;
    color:#212529;
}

.form-control{
    height:55px;
    border-radius:12px;
    border:1px solid #dfe3e8;
    padding:12px 15px;
    transition:.3s;
    box-shadow:none;
}

textarea.form-control{
    height:140px;
    resize:none;
}

.form-control:focus{
    border-color:#0d6efd;
    box-shadow:0 0 0 0.2rem rgba(13,110,253,.15);
}

.btn-send{
    width:100%;
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    border:none;
    border-radius:50px;
    padding:15px;
    font-size:18px;
    font-weight:600;
    transition:.3s;
}

.btn-send:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(13,110,253,.3);
}

.contact-info{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-bottom:40px;
    flex-wrap:wrap;
}

.info-card{
    background:#f8f9fa;
    padding:20px;
    border-radius:15px;
    text-align:center;
    width:180px;
    transition:.3s;
}

.info-card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.info-card i{
    font-size:30px;
    color:#0d6efd;
    margin-bottom:10px;
}

@media(max-width:768px){

    .contact-box{
        margin:20px;
        padding:30px 20px;
    }

    .contact-info{
        gap:15px;
    }

    .info-card{
        width:100%;
    }

}
</style>

</head>
<body>

<div class="container">

<div class="contact-box">

<h2 class="text-center mb-4">Get In Touch</h2>

<form id="contact-form">

    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Company Name</label>
        <input type="text" name="company" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text" name="phone" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Message</label>
        <textarea name="message" class="form-control" rows="5"></textarea>
    </div>

    <button type="submit" class="btn-send">
        Send Message
    </button>

</form>

<div id="result" class="mt-3 text-center"></div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function () {

    emailjs.init({
        publicKey: "YX8S-16XSIfiNb8TY"
    });

    const form = document.getElementById("contact-form");
    const result = document.getElementById("result");

    form.addEventListener("submit", function (e) {

        e.preventDefault();

        result.innerHTML = "<span class='text-primary'>Sending message...</span>";

        emailjs.sendForm(
            "patkar2810",
            "template_fqtcnb4",
            form
        )
        .then(function () {

            result.innerHTML =
                "<span class='text-success fw-bold'>✓ Message sent successfully!</span>";

            form.reset();

        })
        .catch(function (error) {

            console.error("EmailJS Error:", error);

            result.innerHTML =
                "<span class='text-danger fw-bold'>✗ Failed to send message.</span>";

            alert(
                "Error:\n" +
                JSON.stringify(error)
            );

        });

    });

})();
</script>

</body>
</html>
